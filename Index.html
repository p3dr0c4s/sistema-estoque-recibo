<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Estoque</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>Sistema de Estoque</h1>

  <!-- FORM -->
  <div class="form">
    <input id="nome" placeholder="Nome do produto">
    <input id="preco" type="number" placeholder="Preço">
    <input id="qtd" type="number" placeholder="Quantidade">
    <button onclick="adicionar()">Adicionar</button>
  </div>

  <!-- ESTOQUE -->
  <div class="estoque">
    <h2>Estoque</h2>
    <ul id="lista"></ul>
  </div>

  <!-- RECIBO -->
  <div class="recibo">
    <h2>Gerar Recibo</h2>
    <button onclick="gerarRecibo()">Gerar Recibo</button>

    <div id="reciboArea"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
